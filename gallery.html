<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Jatayu</title>
  <link rel="icon" type="image/png" href="images/jatayulogo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
  background: black;
  color: white;
  position: relative;
}

body::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:500px;
  pointer-events:none;
  z-index:0;

  background:
    radial-gradient(circle at 50% 40%, rgba(255,0,0,0.25), transparent 70%);

  filter: blur(40px);
}

body > * {
  position: relative;
  z-index: 1;
}

/* HEADER (SAME AS INDEX) */
.header {
  position: sticky;
  top: 0;
  z-index: 100;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 12px 20px;

  background: rgba(10, 10, 10, 0.5);
  backdrop-filter: blur(16px);

  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.left-nav {
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  color:#ff2a2a;
  font-weight:700;
  font-size:24px;
}

.header a {
  position: relative;
  display: inline-block;
  padding: 8px 18px;
  margin-left: 12px;

  color: white;
  text-decoration: none;
  font-size: 14px;

  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255, 255, 255, 0.15);
  transition: all 0.25s ease;
}

.header a.active {
  background: rgba(255, 255, 255, 0.22);
  box-shadow:
    0 0 20px rgba(255,255,255,0.35),
    inset 0 0 12px rgba(255,255,255,0.12);
}

/* SECTION */
.section {
  padding:80px 20px;
}

.section h2 {
  text-align:center;
  margin-bottom:40px;
  color:#ff2a2a;
}

/* GALLERY */
.gallery-section {
  margin-bottom:50px;
}

.gallery-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 25px;

  text-align: center;

  color: #ff2a2a;

  text-shadow:
    0 0 10px rgba(255,0,0,0.6),
    0 0 25px rgba(255,0,0,0.4),
    0 0 40px rgba(255,0,0,0.2);
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
  padding: 0 20px;
}

.gallery-grid img {
  width: 100%;
  height: auto;              /* 🔥 KEY FIX */
  border-radius: 16px;
  object-fit: cover;

  transition: 0.3s ease;
  opacity: 0;
  transform: translateY(20px);
}

.gallery-grid img:hover {
  transform: scale(1.05);
}

/* smooth load animation */
.gallery-grid img.loaded {
  opacity: 1;
  transform: translateY(0);
}

/* hover */
.gallery-grid img:hover {
  transform: scale(1.03);
}

/* MOBILE */
@media (max-width: 600px) {
  .gallery-grid {
    grid-template-columns: repeat(2, 1fr); /* 🔥 FIX */
    gap: 10px;
    padding: 0 10px;
  }
  .gallery-grid img {
    height: 160px; /* 🔥 smaller, fits screen better */
  }
}

footer {
  text-align:center;
  padding:20px;
  opacity:0.5;
}

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;

  z-index: 9999;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 16px;
}
.gallery-message {
  text-align: center;
  margin-bottom: 15px;
  font-size: 14px;
  opacity: 0.7;

  color: #ff4d4d;

  text-shadow:
    0 0 8px rgba(255,0,0,0.4),
    0 0 20px rgba(255,0,0,0.2);
}

.lightbox.active {
  opacity: 1;
  pointer-events: all;
}
  @media (max-width: 600px) {

  .left-nav {
    gap: 8px;
  }

  nav {
    display: flex;
    flex-wrap: nowrap;        /* 🔥 stop vertical stacking */
    overflow-x: auto;         /* 🔥 allow horizontal scroll */
    gap: 8px;
  }

  nav::-webkit-scrollbar {
    display: none;
  }

  .header a {
    padding: 5px 10px;
    font-size: 12px;
    white-space: nowrap;      /* 🔥 prevent text breaking */
  }

}
</style>
</head>

<body>

<header class="header">
  <div class="left-nav">
    <div class="logo">JATAYU</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html" class="active">Student Gallery</a>
      <a href="jatayu2025.html">Jatayu 2025</a>
    </nav>
  </div>
</header>

<section class="section">

  <div id="gallery"></div>
</section>

<footer>
  Jatayu 2026
</footer>
<div id="lightbox" class="lightbox">
  <img id="lightbox-img">
</div>
<script>
const folders = ["250326"];

// latest first
folders.sort((a,b)=>b.localeCompare(a));

const container = document.getElementById("gallery");
  function formatDate(folder) {
  const day = parseInt(folder.slice(0,2));
  const month = parseInt(folder.slice(2,4)) - 1;
  const year = 2000 + parseInt(folder.slice(4,6));

  const date = new Date(year, month, day);

  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  today.setHours(0,0,0,0);
  yesterday.setHours(0,0,0,0);
  date.setHours(0,0,0,0);

  if (date.getTime() === today.getTime()) return "Today";
  if (date.getTime() === yesterday.getTime()) return "Yesterday";

  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  let suffix = "th";
  if (day % 10 === 1 && day !== 11) suffix = "st";
  else if (day % 10 === 2 && day !== 12) suffix = "nd";
  else if (day % 10 === 3 && day !== 13) suffix = "rd";

  return `${day}${suffix} ${months[month]}`;
}

folders.forEach(folder => {

  const section = document.createElement("div");
  section.className = "gallery-section";

  function formatDate(folder) {
  const day = parseInt(folder.slice(0,2));
  const month = parseInt(folder.slice(2,4)) - 1;
  const year = 2000 + parseInt(folder.slice(4,6));

  const date = new Date(year, month, day);

  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  // remove time for accurate compare
  today.setHours(0,0,0,0);
  yesterday.setHours(0,0,0,0);
  date.setHours(0,0,0,0);

  if (date.getTime() === today.getTime()) {
    return "Today";
  }

  if (date.getTime() === yesterday.getTime()) {
    return "Yesterday";
  }

  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  let suffix = "th";
  if (day % 10 === 1 && day !== 11) suffix = "st";
  else if (day % 10 === 2 && day !== 12) suffix = "nd";
  else if (day % 10 === 3 && day !== 13) suffix = "rd";

  return `${day}${suffix} ${months[month]}`;
}

  const title = document.createElement("div");
title.className = "gallery-title";

// 🔥 new message
const message = document.createElement("div");
message.className = "gallery-message";
message.innerText = "If you want your image added here, send it to 9372221349";

section.appendChild(message);

title.innerText = formatDate(folder);

  const grid = document.createElement("div");
  grid.className = "gallery-grid";

  section.appendChild(title);
  section.appendChild(grid);
  container.appendChild(section);

  let i = 1;

  function loadNext() {
    const img = new Image();

    const jpgPath = `galleryimages/${folder}/${i}.jpg`;
    const pngPath = `galleryimages/${folder}/${i}.png`;

    img.src = jpgPath;

    img.onload = () => {
      img.classList.add("loaded");
      grid.appendChild(img);
      i++;
      loadNext();
    };

    img.onerror = () => {
      const imgPng = new Image();
      imgPng.src = pngPath;

      imgPng.onload = () => {
        imgPng.classList.add("loaded");
        grid.appendChild(imgPng);
        i++;
        loadNext();
      };

      imgPng.onerror = () => {
        // stop
      };
    };
  }

  loadNext(); // 🔥 THIS WAS MISSING
});
</script>
<script>
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

// OPEN (works for dynamic images)
document.body.addEventListener("click", function(e) {
  if (e.target.matches(".gallery-grid img")) {
    lightboxImg.src = e.target.src;
    lightbox.classList.add("active");
  }
});

// CLOSE
lightbox.addEventListener("click", () => {
  lightbox.classList.remove("active");
  lightboxImg.src = "";
});

// ESC key
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    lightbox.classList.remove("active");
    lightboxImg.src = "";
  }
});
</script>

</body>
</html>
