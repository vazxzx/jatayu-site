<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Jatayu</title>
<link rel="icon" type="image/png" href="images/jatayulogo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

/* ===== GLOBAL ===== */
html, body {
  overflow-x: hidden;
}

body {
  background: black;
  color: white;
  position: relative;
}

body::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:500px;
  pointer-events:none;
  z-index:0;

  background: radial-gradient(circle at 50% 40%, rgba(255,0,0,0.25), transparent 70%);
  filter: blur(40px);
}

body > * {
  position: relative;
  z-index: 1;
}

/* ===== GLOBAL FIX ===== */
html {
  overflow-x: hidden;
}

body {
  overflow-x: visible; /* 🔥 allow glow to breathe */
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;

  display: flex;
  align-items: center;

  padding: 12px 16px;

  background: rgba(10, 10, 10, 0.5);
  backdrop-filter: blur(16px);

  border-bottom: 1px solid rgba(255,255,255,0.08);

  overflow: visible;
  overflow-x: clip;
}

.left-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  overflow: visible;
  min-width: 0;
}

.logo {
  color:#ff2a2a;
  font-weight:700;
  font-size:24px;
  white-space: nowrap;
}

nav {
  display: flex;
  gap: 10px;

  flex-wrap: nowrap;
  overflow-x: auto;

  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;

  padding: 14px 0;
}

nav::-webkit-scrollbar {
  display: none;
}


.header a {
  flex: 0 0 auto;
  white-space: nowrap;

  position: relative;
  padding: 8px 16px;
  font-size: 14px;

  color: white;
  text-decoration: none;

  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.15);

  transition: all 0.25s ease;
}

.header a::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 999px;

  background: radial-gradient(circle at var(--x, 50%) var(--y, 50%),
    rgba(255,255,255,0.18),
    transparent 45%
  );

  opacity: 0;
  transition: opacity 0.25s;

  pointer-events: none;
}

.header a:hover::before {
  opacity: 1;
}

.header a:hover {
  transform: scale(1.08);
  background: rgba(255,255,255,0.12);
}

.header a.active {
  background: rgba(255,255,255,0.22);

  box-shadow:
    0 0 10px rgba(255,255,255,0.25),
    0 0 18px rgba(255,255,255,0.12),
    inset 0 0 8px rgba(255,255,255,0.1);

  transform: scale(1.05);
}

@media (max-width: 600px) {
  .header a {
    font-size: 12px;
    padding: 6px 12px;
  }

  .logo {
    font-size: 18px;
  }
}

/* ===== SECTION ===== */
.section {
  padding:80px 20px;
}

/* ===== GALLERY ===== */
.gallery-section {
  margin-bottom:50px;
}

.gallery-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 25px;
  text-align: center;
  color: #ff2a2a;

  text-shadow:
    0 0 10px rgba(255,0,0,0.6),
    0 0 25px rgba(255,0,0,0.4),
    0 0 40px rgba(255,0,0,0.2);
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
  padding: 0 20px;
}

.gallery-grid img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 16px;

  transition: 0.3s ease;
  opacity: 0;
  transform: translateY(20px);
}

.gallery-grid img.loaded {
  opacity: 1;
  transform: translateY(0);
}

.gallery-grid img:hover {
  transform: scale(1.03);
}

/* MOBILE GRID */
@media (max-width: 600px) {
  .gallery-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 8px;
  }

  .gallery-grid img {
    aspect-ratio: 1/1;
    height: auto;
    border-radius: 12px;
  }
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  opacity:0.5;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
  z-index: 9999;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 16px;
}

.lightbox.active {
  opacity: 1;
  pointer-events: all;
}

.gallery-message {
  text-align: center;
  margin-bottom: 15px;
  font-size: 14px;
  opacity: 0.7;
  color: #ff4d4d;
}
</style>
</head>

<body>

<header class="header">
  <div class="left-nav">
    <div class="logo">JATAYU</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html" class="active">Student Gallery</a>
      <a href="jatayu2025.html">Jatayu 2025</a>
    </nav>
  </div>
</header>

<section class="section">
  <div id="gallery"></div>
</section>

<footer>
  Jatayu 2026
</footer>

<div id="lightbox" class="lightbox">
  <img id="lightbox-img">
</div>

<script>
const folders = ["250326"];
folders.sort((a,b)=>b.localeCompare(a));
const container = document.getElementById("gallery");

function formatDate(folder) {
  const day = parseInt(folder.slice(0,2));
  const month = parseInt(folder.slice(2,4)) - 1;
  const year = 2000 + parseInt(folder.slice(4,6));

  const date = new Date(year, month, day);

  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  today.setHours(0,0,0,0);
  yesterday.setHours(0,0,0,0);
  date.setHours(0,0,0,0);

  if (date.getTime() === today.getTime()) return "Today";
  if (date.getTime() === yesterday.getTime()) return "Yesterday";

  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  let suffix = "th";
  if (day % 10 === 1 && day !== 11) suffix = "st";
  else if (day % 10 === 2 && day !== 12) suffix = "nd";
  else if (day % 10 === 3 && day !== 13) suffix = "rd";

  return `${day}${suffix} ${months[month]}`;
}

folders.forEach(folder => {
  const section = document.createElement("div");
  section.className = "gallery-section";

  const title = document.createElement("div");
  title.className = "gallery-title";
  title.innerText = formatDate(folder);

  const message = document.createElement("div");
  message.className = "gallery-message";
  message.innerText = "If you want your image added here, send it to 9372221349";

  const grid = document.createElement("div");
  grid.className = "gallery-grid";

  section.appendChild(message);
  section.appendChild(title);
  section.appendChild(grid);
  container.appendChild(section);

  let i = 1;

  function loadNext() {
    const img = new Image();
    const jpg = `galleryimages/${folder}/${i}.jpg`;
    const png = `galleryimages/${folder}/${i}.png`;

    img.src = jpg;

    img.onload = () => {
      img.classList.add("loaded");
      grid.appendChild(img);
      i++;
      loadNext();
    };

    img.onerror = () => {
      const imgPng = new Image();
      imgPng.src = png;

      imgPng.onload = () => {
        imgPng.classList.add("loaded");
        grid.appendChild(imgPng);
        i++;
        loadNext();
      };
    };
  }

  loadNext();
});

/* LIGHTBOX */
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

document.body.addEventListener("click", e => {
  if (e.target.matches(".gallery-grid img")) {
    lightboxImg.src = e.target.src;
    lightbox.classList.add("active");
  }
});

lightbox.addEventListener("click", () => {
  lightbox.classList.remove("active");
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    lightbox.classList.remove("active");
  }
});
</script>
<script>
document.querySelectorAll('.header a').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;

    card.style.setProperty('--x', x + '%');
    card.style.setProperty('--y', y + '%');
  });
});
</script>
</body>
</html>
