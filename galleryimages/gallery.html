<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - Jatayu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #111;
    }

    .header a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header class="header">
  <div>JATAYU</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
  </nav>
</header>

<div class="gallery" id="gallery"></div>

<script>
  const imageFolder = "galleryimages/";
  const images = [
    "img1.jpg",
    "img2.jpg",
    "img3.jpg"
  ];

  const gallery = document.getElementById("gallery");

  images.forEach(img => {
    const image = document.createElement("img");
    image.src = imageFolder + img;
    gallery.appendChild(image);
  });
</script>

</body>
</html>
