<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jatayu Sports</title>

  <!-- Google Font -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #05070d;
      color: white;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 60px;
      position: absolute;
      width: 100%;
      z-index: 10;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 2px;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(circle at center, rgba(255,215,0,0.15), transparent 60%),
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
        url('https://images.unsplash.com/photo-1505842465776-3ac1d0f63f84');
      background-size: cover;
      background-position: center;
    }

    .hero h1 {
      font-size: 70px;
      font-weight: 700;
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255,215,0,0.6);
    }

    .hero p {
      margin-top: 15px;
      font-size: 20px;
      opacity: 0.85;
    }

    /* SECTION */
    .section {
      padding: 100px 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 38px;
      margin-bottom: 50px;
      color: #ffd700;
    }

    /* EVENT CARD */
    .event-card {
      width: 350px;
      margin: auto;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,215,0,0.2);
      box-shadow: 0 0 40px rgba(255,215,0,0.1);
      transition: 0.4s;
    }

    .event-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 0 60px rgba(255,215,0,0.25);
    }

    .event-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .event-info {
      padding: 25px;
    }

    .event-info h3 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .event-info p {
      opacity: 0.75;
      margin: 6px 0;
      font-size: 15px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      background: #02040a;
      opacity: 0.6;
      font-size: 14px;
    }

  </style>

</head>

<body>

  <!-- NAV -->

  <nav>
    <div class="logo">JATAYU</div>
  </nav>

  <!-- HERO -->

  <section class="hero">
    <div>
      <h1>JATAYU SPORTS</h1>
      <p>Where competition meets legacy</p>
    </div>
  </section>

  <!-- EVENTS -->

  <section class="section">
    <h2>Upcoming Sport</h2>

```
<div class="event-card">
  <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">

  <div class="event-info">
    <h3>Football Championship</h3>
    <p>📅 10 April 2026</p>
    <p>⏰ 5:00 PM</p>
  </div>
</div>
```

  </section>

  <footer>
    © 2026 Jatayu Sports
  </footer>

</body>
</html>
