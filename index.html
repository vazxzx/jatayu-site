<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jatayu Sports</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0b0f1a;
      color: white;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: gold;
    }

    /* HERO */
    .hero {
      height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
                  url('https://images.unsplash.com/photo-1505842465776-3ac1d0f63f84');
      background-size: cover;
      background-position: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 48px;
      color: gold;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.8;
    }

    /* EVENT SECTION */
    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 32px;
      margin-bottom: 30px;
      color: gold;
    }

    .event-card {
      max-width: 350px;
      margin: auto;
      background: #111827;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .event-card:hover {
      transform: translateY(-10px);
    }

    .event-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .event-info {
      padding: 20px;
    }

    .event-info h3 {
      margin-bottom: 10px;
    }

    .event-info p {
      opacity: 0.7;
      margin-bottom: 5px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>

</head>

<body>

  <!-- NAVBAR -->

  <nav>
    <div class="logo">JATAYU</div>
  </nav>

  <!-- HERO -->

  <section class="hero">
    <h1>Jatayu Sports</h1>
    <p>Unleash the spirit of competition</p>
  </section>

  <!-- UPCOMING EVENT -->

  <section class="section">
    <h2>Upcoming Sport</h2>

```
<div class="event-card">
  <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b" alt="event">

  <div class="event-info">
    <h3>Tug of War</h3>
    <p>📅 25 March 2026</p>
    <p>⏰ 5:00 PM</p>
  </div>
</div>
```

  </section>

  <!-- FOOTER -->

  <footer>
    © 2026 Jatayu Sports. All rights reserved.
  </footer>

</body>
</html>
